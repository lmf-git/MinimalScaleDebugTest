name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Svelte app
        run: yarn build

      - name: Verify build output
        run: ls -R build

      - name: Package and publish Electron app
        run: yarn electron-builder --${{ matrix.os == 'windows-latest' && 'win' || 'mac' }} --${{ matrix.os == 'windows-latest' && 'x64' || 'universal' }} --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Scale-Debug-Windows-${{ github.ref_name }}
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Scale-Debug-MacOS-${{ github.ref_name }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30
